const buildMiniMap = (state, currentId) => {
  const container = h("div", { class: "mini-map" });
  const canvas = h("canvas", { "aria-hidden": "true" });
  const button = h("button", {
    class: "mini-map-button",
    type: "button",
    "aria-label": LOCALE.ui.openNav,
  });
  const icon = h("div", { class: "mini-map-icon" });
  icon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><circle cx="5" cy="6" r="2"/><circle cx="19" cy="7" r="2"/><circle cx="7" cy="18" r="2"/><circle cx="18" cy="17" r="2"/><line x1="12" y1="9" x2="7" y2="7.2"/><line x1="12" y1="9" x2="17.2" y2="7.4"/><line x1="12" y1="15" x2="8.4" y2="16.8"/><line x1="12" y1="15" x2="16.6" y2="16.2"/></svg>';
  container.append(canvas, icon, button);

  let visited = new Set(state.v);
  let activeId = currentId || null;
  let highlightIds = new Set();
  let edgeFilter = null;
  let trailNodes = getTrailSegments(state.tr);
  let traversedEdges = state.te || deriveTraversedEdges(state.tr);
  let isVisible = true;
  let rafId = null;
  let breatheStart = null;
  let transitionStart = null;
  let prevHighlightIds = null;
  let prevEdgeFilter = null;
  let prevActiveId = null;

  const computeContext = (id) => {
    const hl = new Set();
    let ef = null;
    if (id) {
      hl.add(id);
      GRAPH.edges.forEach(([fromId, toId]) => {
        if (fromId === id) hl.add(toId);
        if (toId === id) hl.add(fromId);
      });
      ef = (fromId, toId) => fromId === id || toId === id;
    } else {
      GRAPH.nodes.forEach((node) => hl.add(node.id));
    }
    return { hl, ef };
  };

  const ctx = computeContext(currentId);
  highlightIds = ctx.hl;
  edgeFilter = ctx.ef;

  const isMobile = () => window.matchMedia("(max-width: 480px)").matches;

  const render = (alpha) => {
    const rect = container.getBoundingClientRect();
    if (!rect.width || !rect.height) return;
    drawGraph({
      canvas,
      width: rect.width,
      height: rect.height,
      visited,
      activeId,
      highlightIds,
      edgeFilter,
      showLabels: false,
      showTrail: trailNodes.length > 1,
      trailNodes,
      curvedEdges: true,
      softenUnvisited: true,
      activeGlow: !!activeId,
      breatheAlpha: alpha,
      traversedEdges,
    });
  };

  const animate = (timestamp) => {
    if (!isVisible) return;
    if (breatheStart === null) breatheStart = timestamp;
    const elapsed = (timestamp - breatheStart) / 1000;
    const alpha = 1 + 0.08 * Math.sin((2 * Math.PI * elapsed) / 5);

    if (transitionStart !== null) {
      const tElapsed = timestamp - transitionStart;
      const tProgress = Math.min(tElapsed / 300, 1);
      if (tProgress >= 1) {
        transitionStart = null;
        prevHighlightIds = null;
        prevEdgeFilter = null;
        prevActiveId = null;
      }
    }

    render(alpha);
    rafId = requestAnimationFrame(animate);
  };

  const startAnimation = () => {
    if (isMobile()) return;
    if (prefersReducedMotion()) {
      render(1);
      return;
    }
    if (rafId !== null) return;
    breatheStart = null;
    rafId = requestAnimationFrame(animate);
  };

  const stopAnimation = () => {
    if (rafId !== null) {
      cancelAnimationFrame(rafId);
      rafId = null;
    }
  };

  const visObserver = new IntersectionObserver(([entry]) => {
    isVisible = entry.isIntersecting;
    if (isVisible) {
      startAnimation();
    } else {
      stopAnimation();
    }
  });
  visObserver.observe(container);

  const resizeObserver = new ResizeObserver(() => {
    if (!isMobile() && prefersReducedMotion()) {
      render(1);
    }
  });
  resizeObserver.observe(container);

  if (!isMobile()) {
    render(1);
    startAnimation();
  }

  const updateContext = (newState, newCurrentId) => {
    const newVisited = new Set(newState.v);
    const newTrail = getTrailSegments(newState.tr);
    const newCtx = computeContext(newCurrentId);

    if (!prefersReducedMotion() && !isMobile() && activeId !== (newCurrentId || null)) {
      prevHighlightIds = highlightIds;
      prevEdgeFilter = edgeFilter;
      prevActiveId = activeId;
      transitionStart = performance.now();
    }

    visited = newVisited;
    activeId = newCurrentId || null;
    highlightIds = newCtx.hl;
    edgeFilter = newCtx.ef;
    trailNodes = newTrail;
    traversedEdges = newState.te || deriveTraversedEdges(newState.tr);

    if (!isMobile()) {
      if (prefersReducedMotion()) render(1);
    }
  };

  return {
    container,
    button,
    updateContext,
    cleanup: () => {
      stopAnimation();
      visObserver.disconnect();
      resizeObserver.disconnect();
    },
  };
};

const buildScrolly = ({ steps, whispers, questionCards, scrubUpdate, vizContent, onStepChange, state, plateauId }) => {
  const hasViz = !!vizContent;
  const section = h("section", { class: hasViz ? "scrolly" : "scrolly scrolly-no-viz" });
  let viz = null;
  let vizMain = null;
  let constellation = null;
  if (hasViz) {
    viz = h("div", { class: "scrolly-viz" });
    vizMain = h("div", { class: "viz-main" });
    vizMain.appendChild(vizContent);
    const whispersLayer = h("div", { class: "whisper-layer" });
    const pips = h("div", { class: "trace-pips" });
    constellation = h("div", { class: "constellation" });
    if (plateauId) {
      const visited = new Set(state && state.v ? state.v : []);
      const constellationContent = buildSimpleConstellation(plateauId, visited, whispers);
      constellation.appendChild(constellationContent);
    }
    viz.append(vizMain, whispersLayer, pips, constellation);
  }

  const stepsWrap = h("div", { class: "scrolly-steps" });
  const stepEls = steps.map((content, index) => {
    const step = h("div", { class: "scrolly-step" });
    if (typeof content === "string") {
      step.appendChild(h("p", null, content));
    } else if (typeof content === "function") {
      content(step);
    }
    if (index === 0) step.classList.add("is-active");
    stepsWrap.appendChild(step);
    return step;
  });

  if (hasViz) {
    const whispersLayer = viz.querySelector(".whisper-layer");
    const pips = viz.querySelector(".trace-pips");
    whispers.forEach((whisper) => {
      const line = h("a", { class: "whisper", href: `#/${whisper.to}` }, whisper.text);
      whispersLayer.appendChild(line);
      const pip = h("span", { class: "trace-pip" });
      pips.appendChild(pip);
    });
  }

  const cards = h("div", { class: "question-cards" });
  const visited = state ? new Set(state.v) : new Set();
  questionCards.forEach((card) => {
    const el = h(
      "a",
      { class: `question-card${visited.has(card.to) ? " is-visited" : ""}`, href: `#/${card.to}` },
      h("span", null, card.question),
      h("strong", null, card.title)
    );
    if (state) el.style.opacity = getFlightOpacity(state, card.to);
    cards.appendChild(el);
  });
  stepsWrap.appendChild(cards);

  if (viz) section.appendChild(viz);
  section.appendChild(stepsWrap);

  let activeStepIndex = 0;
  const onStep = (idx) => {
    activeStepIndex = idx;
    stepEls.forEach((step, index) => {
      step.classList.toggle("is-active", index === idx);
    });
    if (hasViz) {
      const whispersLayer = viz.querySelector(".whisper-layer");
      const pips = viz.querySelector(".trace-pips");
      whispers.forEach((whisper, index) => {
        const line = whispersLayer.children[index];
        const pip = pips.children[index];
        const isVisible = idx >= whisper.step && idx < steps.length - 1;
        line.classList.toggle("is-visible", isVisible);
        pip.classList.toggle("is-lit", idx >= whisper.step);
      });
      const isFinal = idx === steps.length - 1;
      viz.classList.toggle("is-constellation", isFinal);
      constellation.classList.toggle("is-visible", isFinal);
    }
    if (onStepChange) onStepChange(idx);
  };

  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          const index = stepEls.indexOf(entry.target);
          if (index >= 0) onStep(index);
        }
      });
    },
    { threshold: 0.55 }
  );

  stepEls.forEach((step) => observer.observe(step));

  let scrubTicking = false;
  let scrubCleanup = null;
  if (scrubUpdate) {
    const onScroll = () => {
      if (scrubTicking) return;
      scrubTicking = true;
      requestAnimationFrame(() => {
        const activeStep = stepEls[activeStepIndex];
        if (activeStep) {
          const rect = activeStep.getBoundingClientRect();
          const viewH = window.innerHeight;
          const progress = Math.max(0, Math.min(1, 1 - (rect.bottom / (rect.height + viewH))));
          scrubUpdate(activeStepIndex, progress, vizMain);
        }
        scrubTicking = false;
      });
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    scrubCleanup = () => window.removeEventListener("scroll", onScroll);
  }

  const cleanup = () => {
    observer.disconnect();
    if (scrubCleanup) scrubCleanup();
  };

  return { section, vizMain, cleanup };
};

let seedPopoverId = 0;
const buildInlineSeed = ({ id, label, detail, type, danglingTo, danglingText, state, plateauId, onOpen }) => {
  const popoverDomId = `seed-popover-${seedPopoverId++}`;
  const attrs = {
    class: "inline-seed-button",
    type: "button",
    "aria-expanded": "false",
    "aria-controls": popoverDomId,
  };
  if (type) attrs["data-seed-type"] = type;
  const button = h("button", attrs, label);

  const contentChildren = typeof detail === "function" ? detail(state) : detail;
  const contentEl = h("div", { class: "inline-seed-popover-content", "aria-live": "polite" });
  if (contentChildren != null) {
    contentEl.appendChild(renderContent(contentChildren, { state, plateauId, onSeedOpen: onOpen }));
  }

  if (type === "dangling" && danglingTo && danglingText) {
    contentEl.appendChild(document.createTextNode(" "));
    contentEl.appendChild(
      h("a", { class: "dangling-link", href: `#/${danglingTo}` }, danglingText)
    );
  }

  const popover = h(
    "div",
    { class: "inline-seed-popover", id: popoverDomId, role: "region", "aria-hidden": "true" },
    contentEl
  );
  const wrapper = h("span", { class: "inline-seed" }, button);
  document.body.appendChild(popover);

  const positionPopover = () => {
    const rect = button.getBoundingClientRect();
    const popW = 360;
    const popH = popover.offsetHeight || 200;
    let top = rect.bottom + 6;
    let left = rect.left + rect.width / 2 - popW / 2;
    if (left < 8) left = 8;
    if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
    if (top + popH > window.innerHeight - 8) {
      top = rect.top - popH - 6;
    }
    popover.style.top = `${top}px`;
    popover.style.left = `${left}px`;
  };

  const closePopover = () => {
    button.setAttribute("aria-expanded", "false");
    popover.classList.remove("is-open");
    popover.setAttribute("aria-hidden", "true");
    document.removeEventListener("click", outsideClick, true);
    document.removeEventListener("keydown", escClose);
    window.removeEventListener("scroll", onScroll, true);
  };

  const onScroll = () => {
    positionPopover();
  };

  const outsideClick = (e) => {
    if (!popover.contains(e.target) && e.target !== button) {
      closePopover();
    }
  };

  const escClose = (e) => {
    if (e.key === "Escape") closePopover();
  };

  button.addEventListener("click", () => {
    const isOpen = button.getAttribute("aria-expanded") === "true";
    if (isOpen) {
      closePopover();
    } else {
      document.querySelectorAll(".inline-seed-popover.is-open").forEach((p) => {
        p.classList.remove("is-open");
        p.setAttribute("aria-hidden", "true");
      });
      document.querySelectorAll('.inline-seed-button[aria-expanded="true"]').forEach((b) => {
        b.setAttribute("aria-expanded", "false");
      });
      positionPopover();
      button.setAttribute("aria-expanded", "true");
      popover.classList.add("is-open");
      popover.setAttribute("aria-hidden", "false");
      requestAnimationFrame(() => {
        document.addEventListener("click", outsideClick, true);
        document.addEventListener("keydown", escClose);
        window.addEventListener("scroll", onScroll, true);
      });
      if (onOpen && id) onOpen(id);
    }
  });

  return wrapper;
};

const buildOverlay = (state) => {
  const overlay = h("div", {
    class: "rhizome-overlay",
    role: "dialog",
    "aria-modal": "true",
    "aria-hidden": "true",
    "aria-label": LOCALE.ui.navigateToEssay,
  });
  const backdrop = h("div", { class: "overlay-backdrop" });
  const panel = h("div", { class: "overlay-panel" });
  const closeButton = h("button", {
    class: "overlay-close",
    type: "button",
    "aria-label": LOCALE.ui.closeNav,
  }, "Close");
  const heading = h("p", {
    style: {
      margin: "0 0 12px 0",
      color: "var(--ink2)",
      fontFamily: "system-ui, -apple-system, 'Segoe UI', sans-serif",
      fontSize: "0.75rem",
      letterSpacing: "0.08em",
      textTransform: "uppercase",
    },
  }, LOCALE.ui.jumpToEssay);
  const mapWrap = h("div", { class: "overlay-map" });
  const canvas = h("canvas", {
    role: "img",
    "aria-label": LOCALE.ui.fullNavAriaLabel,
  });
  const linkLayer = h("div", { class: "overlay-links" });

  mapWrap.append(canvas, linkLayer);
  panel.append(closeButton, heading, mapWrap);
  overlay.append(backdrop, panel);

  let visited = new Set(state.v);
  let trailNodes = getTrailSegments(state.tr);
  let traversedEdges = state.te || deriveTraversedEdges(state.tr);
  const linkMap = new Map();
  const hitRadius = 22;
  let lastSize = { width: 0, height: 0 };
  let hoveredId = null;

  GRAPH.nodes.forEach((node) => {
    const link = h("a", {
      class: "overlay-link",
      href: `#/${node.id}`,
      role: "link",
    });
    linkLayer.appendChild(link);
    linkMap.set(node.id, link);
  });

  const redraw = () => {
    if (!lastSize.width || !lastSize.height) return;
    drawGraph({
      canvas,
      width: lastSize.width,
      height: lastSize.height,
      visited,
      showLabels: true,
      showTrail: true,
      trailNodes,
      hoveredId,
      curvedEdges: true,
      traversedEdges,
    });
  };

  const resize = () => {
    const rect = mapWrap.getBoundingClientRect();
    if (!rect.width || !rect.height) return;
    lastSize = { width: rect.width, height: rect.height };
    redraw();
    GRAPH.nodes.forEach((node) => {
      const link = linkMap.get(node.id);
      if (!link) return;
      const pos = getNodePx(node, rect.width, rect.height);
      link.style.left = `${pos.x}px`;
      link.style.top = `${pos.y}px`;
      link.setAttribute(
        "aria-label",
        `${node.title}, ${visited.has(node.id) ? LOCALE.ui.visited : LOCALE.ui.notVisited}`
      );
    });
  };

  const handleMouseMove = (event) => {
    const rect = mapWrap.getBoundingClientRect();
    const x = event.clientX - rect.left;
    const y = event.clientY - rect.top;
    const hit = GRAPH.nodes.find((node) => {
      const pos = getNodePx(node, lastSize.width, lastSize.height);
      return Math.hypot(x - pos.x, y - pos.y) <= hitRadius;
    });
    const newId = hit ? hit.id : null;
    canvas.style.cursor = newId ? "pointer" : "default";
    if (newId !== hoveredId) {
      hoveredId = newId;
      redraw();
    }
  };

  const handleMouseLeave = () => {
    if (hoveredId) {
      hoveredId = null;
      redraw();
    }
  };

  const handleClick = (event) => {
    const rect = canvas.getBoundingClientRect();
    const x = event.clientX - rect.left;
    const y = event.clientY - rect.top;
    const hit = GRAPH.nodes.find((node) => {
      const pos = getNodePx(node, lastSize.width, lastSize.height);
      const dx = x - pos.x;
      const dy = y - pos.y;
      return Math.hypot(dx, dy) <= hitRadius;
    });
    if (hit) {
      location.hash = `#/${hit.id}`;
    }
  };

  const observer = new ResizeObserver(resize);
  observer.observe(mapWrap);
  mapWrap.addEventListener("mousemove", handleMouseMove);
  mapWrap.addEventListener("mouseleave", handleMouseLeave);
  canvas.addEventListener("click", handleClick);
  resize();

  const focusables = Array.from(linkLayer.querySelectorAll("a")).concat([closeButton]);

  const updateState = (newState) => {
    visited = new Set(newState.v);
    trailNodes = getTrailSegments(newState.tr);
    traversedEdges = newState.te || deriveTraversedEdges(newState.tr);
    resize();
  };

  return {
    overlay,
    backdrop,
    closeButton,
    focusables,
    updateState,
    cleanup: () => {
      observer.disconnect();
      mapWrap.removeEventListener("mousemove", handleMouseMove);
      mapWrap.removeEventListener("mouseleave", handleMouseLeave);
      canvas.removeEventListener("click", handleClick);
    },
  };
};

const getFocusable = (container) =>
  Array.from(container.querySelectorAll("button, [href], [tabindex]:not([tabindex='-1'])"));

const trapFocus = (container, event) => {
  if (event.key !== "Tab") return;
  const focusable = getFocusable(container);
  if (!focusable.length) return;
  const first = focusable[0];
  const last = focusable[focusable.length - 1];
  if (event.shiftKey && document.activeElement === first) {
    event.preventDefault();
    last.focus();
  } else if (!event.shiftKey && document.activeElement === last) {
    event.preventDefault();
    first.focus();
  }
};

const renderContent = (content, ctx) => {
  const renderItem = (item) => {
    if (item === null || item === undefined) return null;
    if (typeof item === "string") return document.createTextNode(item);
    if (item instanceof Node) return item;
    if (Array.isArray(item)) {
      const [tag, ...children] = item;
      const el = h(tag, null);
      children.forEach((child) => {
        const node = renderItem(child);
        if (node) el.appendChild(node);
      });
      return el;
    }
    if (item.seed) {
      return buildInlineSeed({
        id: item.id,
        label: item.label,
        detail: item.detail,
        type: item.type,
        danglingTo: item.danglingTo,
        danglingText: item.danglingText,
        state: ctx.state,
        plateauId: ctx.plateauId,
        onOpen: ctx.onSeedOpen,
      });
    }
    return null;
  };

  const frag = document.createDocumentFragment();
  if (typeof content === "string") {
    frag.appendChild(document.createTextNode(content));
    return frag;
  }
  if (content instanceof Node) {
    frag.appendChild(content);
    return frag;
  }
  if (Array.isArray(content)) {
    content.forEach((item) => {
      const node = renderItem(item);
      if (node) frag.appendChild(node);
    });
  }
  return frag;
};

    const growth = h(

    );

      class: "seed-button",
      type: "button",
      "aria-expanded": "false",
    };
    if (seed.type) btnAttrs["data-seed-type"] = seed.type;

const buildScatterToText = () => {
  const words = LOCALE.scatterWords;
  const container = h("div", { class: "scatter-container" });
  const wordEls = [];

  const hash = (str) => {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
    return h;
  };

  const cols = 4;
  const rows = Math.ceil(words.length / cols);
  words.forEach((word, i) => {
    const seed = hash(word);
    const initX = ((seed & 0xff) / 255) * 80 + 5;
    const initY = (((seed >> 8) & 0xff) / 255) * 80 + 5;
    const finalCol = i % cols;
    const finalRow = Math.floor(i / cols);
    const finalX = 10 + (finalCol / (cols - 1)) * 80;
    const finalY = 20 + (finalRow / (rows - 1)) * 60;

    const el = h("span", { class: "scatter-word" }, word);
    el.style.left = `${finalX}%`;
    el.style.top = `${finalY}%`;
    el.dataset.initX = initX;
    el.dataset.initY = initY;
    el.dataset.finalX = finalX;
    el.dataset.finalY = finalY;

    if (!prefersReducedMotion()) {
      el.style.transform = `translate(${initX - finalX}vw, ${initY - finalY}vh)`;
    }
    container.appendChild(el);
    wordEls.push(el);
  });

  const update = (progress) => {
    if (prefersReducedMotion()) return;
    wordEls.forEach((el) => {
      const ix = parseFloat(el.dataset.initX);
      const iy = parseFloat(el.dataset.initY);
      const fx = parseFloat(el.dataset.finalX);
      const fy = parseFloat(el.dataset.finalY);
      const dx = (ix - fx) * (1 - progress);
      const dy = (iy - fy) * (1 - progress);
      el.style.transform = `translate(${dx}vw, ${dy}vh)`;
    });
  };

  return { container, update };
};

const setupDwellReveal = (container, annotations) => {
  const timers = new Map();
  const revealed = new Set();
  const DWELL_MS = 3000;

  const targets = container.querySelectorAll(".dwell-target");
  targets.forEach((target) => {
    const paraId = target.dataset.dwellId;
    if (!paraId || !annotations[paraId]) return;

    const annotation = h("div", {
      class: "dwell-annotation",
      "aria-live": "polite",
    }, annotations[paraId]);
    target.appendChild(annotation);

    let timer = null;
    const resetTimer = () => {
      if (timer) clearTimeout(timer);
      if (revealed.has(paraId)) return;
      timer = setTimeout(() => {
        annotation.classList.add("is-revealed");
        revealed.add(paraId);
      }, DWELL_MS);
      timers.set(paraId, timer);
    };

    const clearTimer = () => {
      if (timer) clearTimeout(timer);
      timer = null;
    };

    target.addEventListener("mousemove", resetTimer);
    target.addEventListener("mouseleave", clearTimer);
  });

  return () => {
    timers.forEach((t) => clearTimeout(t));
    timers.clear();
  };
};

const buildVizNextWord = (state) => {
  const sentence = LOCALE.ui.vizSentence;
  const candidates = LOCALE.ui.vizCandidates;
  const reduced = prefersReducedMotion;

  let currentState = 1;
  let temperature = 1.0;
  let cursorPos = 0;

  const applyTemperature = (probs, temp) => {
    if (temp <= 0.01) {
      return probs.map((p, i) => i === 0 ? 1 : 0);
    }
    const logits = probs.map((p) => Math.log(Math.max(p, 1e-9)) / temp);
    const maxLogit = Math.max(...logits);
    const exps = logits.map((l) => Math.exp(l - maxLogit));
    const sum = exps.reduce((a, b) => a + b, 0);
    return exps.map((e) => e / sum);
  };

  const element = h("div", { class: "viz-next-word", style: {
    width: "100%", position: "relative", textTransform: "none", letterSpacing: "normal",
  } });

  const sentenceEl = h("div", { class: "viz-nw-sentence", style: {
    fontFamily: "'Lora', Georgia, serif", fontSize: "1.1rem", lineHeight: "1.6",
    padding: "20px 20px 12px", minHeight: "3.2em", color: "var(--ink)",
  } });

  const canvas = h("canvas", { role: "img", "aria-label": LOCALE.ui.probBarsAriaLabel });
  const canvasWrap = h("div", { style: {
    width: "100%", height: "160px", padding: "0 20px 8px", display: "none",
  } });
  canvasWrap.appendChild(canvas);

  const tempLabel = h("label", { for: "viz-nw-temp", style: {
    fontSize: "0.8rem", color: "var(--ink2)", letterSpacing: "0.04em",
    fontFamily: "system-ui, -apple-system, 'Segoe UI', sans-serif",
  } }, LOCALE.viz.nextWord.temperatureLabel);
  const tempValue = h("span", { "aria-hidden": "true", style: {
    fontSize: "0.8rem", color: "var(--ink2)", marginLeft: "auto",
    fontFamily: "system-ui, -apple-system, 'Segoe UI', sans-serif",
  } }, "1.0");
  const tempSlider = h("input", {
    type: "range", id: "viz-nw-temp", class: "viz-slider",
    min: "0.1", max: "2.0", step: "0.1", value: "1.0",
    "aria-label": "Temperature: controls creativity of word choice",
    "aria-valuemin": "0.1", "aria-valuemax": "2.0", "aria-valuenow": "1.0",
  });
  const controls = h("div", { class: "viz-controls", style: { display: "none" } },
    tempLabel, tempValue, tempSlider
  );

  const srStatus = h("div", {
    class: "viz-sr-status", role: "status", "aria-live": "polite", "aria-atomic": "true",
  });

  element.append(sentenceEl, canvasWrap, controls, srStatus);

  const renderSentence = () => {
    sentenceEl.textContent = "";
    const wordsToShow = Math.min(cursorPos, sentence.length);
    const text = sentence.slice(0, wordsToShow).join(" ");
    sentenceEl.appendChild(document.createTextNode(text ? text + " " : ""));
    const cursor = h("span", { style: {
      display: "inline-block", width: "2px", height: "1.1em",
      background: "var(--acc)", verticalAlign: "text-bottom",
      animation: reduced() ? "none" : "viz-nw-blink 1s step-end infinite",
    } });
    sentenceEl.appendChild(cursor);
  };

  const drawBars = () => {
    const rect = canvasWrap.getBoundingClientRect();
    const w = rect.width - 40;
    const barH = 160;
    if (w <= 0) return;
    const ratio = scaleCanvas(canvas, w, barH);
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    ctx.clearRect(0, 0, w, barH);

    const styles = getComputedStyle(document.documentElement);
    const ink = styles.getPropertyValue("--ink").trim();
    const ink2 = styles.getPropertyValue("--ink2").trim();
    const ink4 = styles.getPropertyValue("--ink4").trim();
    const acc = styles.getPropertyValue("--acc").trim();

    const probs = applyTemperature(candidates.map((c) => c.prob), temperature);
    const maxProb = Math.max(...probs);
    const rowH = barH / candidates.length;
    const labelW = 52;
    const barMaxW = w - labelW - 56;

    candidates.forEach((c, i) => {
      const y = i * rowH;
      const prob = probs[i];
      const barW = (prob / maxProb) * barMaxW;

      ctx.fillStyle = ink2;
      ctx.font = "12px system-ui, -apple-system, 'Segoe UI', sans-serif";
      ctx.textBaseline = "middle";
      ctx.textAlign = "left";
      ctx.fillText(c.token, 0, y + rowH / 2);

      ctx.fillStyle = i === 0 ? acc : ink4;
      ctx.globalAlpha = 0.7 + prob * 0.3;
      const barRadius = 3;
      const barX = labelW;
      const barY = y + rowH / 2 - 8;
      ctx.beginPath();
      ctx.roundRect(barX, barY, Math.max(barW, 2), 16, barRadius);
      ctx.fill();
      ctx.globalAlpha = 1;

      ctx.fillStyle = ink2;
      ctx.textAlign = "left";
      ctx.fillText((prob * 100).toFixed(1) + "%", labelW + barW + 8, y + rowH / 2);
    });
  };

  const updateState = () => {
    if (currentState === 1) {
      canvasWrap.style.display = "none";
      controls.style.display = "none";
      renderSentence();
      srStatus.textContent = `Typing: "${sentence.slice(0, Math.min(cursorPos, sentence.length)).join(" ")}"`;
    } else if (currentState === 2) {
      cursorPos = sentence.length;
      renderSentence();
      canvasWrap.style.display = "block";
      controls.style.display = "none";
      drawBars();
      const desc = candidates.map((c) => `${c.token}: ${(c.prob * 100).toFixed(0)}%`).join(", ");
      srStatus.textContent = `Next token candidates: ${desc}`;
    } else if (currentState === 3) {
      cursorPos = sentence.length;
      renderSentence();
      canvasWrap.style.display = "block";
      controls.style.display = "flex";
      drawBars();
      const probs = applyTemperature(candidates.map((c) => c.prob), temperature);
      const desc = candidates.map((c, i) => `${c.token}: ${(probs[i] * 100).toFixed(0)}%`).join(", ");
      srStatus.textContent = `Temperature ${temperature.toFixed(1)}. Distribution: ${desc}`;
    }
  };

  tempSlider.addEventListener("input", () => {
    temperature = parseFloat(tempSlider.value);
    tempValue.textContent = temperature.toFixed(1);
    tempSlider.setAttribute("aria-valuenow", temperature.toFixed(1));
    drawBars();
    const probs = applyTemperature(candidates.map((c) => c.prob), temperature);
    const desc = candidates.map((c, i) => `${c.token}: ${(probs[i] * 100).toFixed(0)}%`).join(", ");
    srStatus.textContent = `Temperature ${temperature.toFixed(1)}. Distribution: ${desc}`;
  });

  const onStep = (idx) => {
    const totalSteps = 5;
    if (idx >= totalSteps - 1) {
      currentState = 0;
      canvasWrap.style.display = "none";
      controls.style.display = "none";
      return;
    }
    if (idx <= 1) currentState = 1;
    else if (idx === 2) currentState = 2;
    else currentState = 3;
    updateState();
  };

  const scrubUpdate = (stepIdx, progress) => {
    if (currentState === 1) {
      const totalWords = sentence.length;
      const globalProgress = (stepIdx + progress) / 2;
      cursorPos = Math.floor(globalProgress * (totalWords + 1));
      renderSentence();
    }
  };

  updateState();

  return {
    element,
    onStep,
    scrubUpdate,
    cleanup: () => {},
  };
};

const buildVizAveragingProblem = (state) => {
  const vap = LOCALE.viz.averagingProblem;
  const regionPeaks = [0.2, 0.45, 0.7, 0.9];
  const regionColors = ["var(--ink2)", "var(--ink3)", "var(--acc)", "var(--seed)"];
  const regions = vap.regions.map((r, i) => ({ ...r, peak: regionPeaks[i], color: regionColors[i] }));
  const reduced = prefersReducedMotion;

  let currentState = 1;
  let activeRegion = null;
  let specificity = 0.0;

  const element = h("div", { class: "viz-averaging", style: {
    width: "100%", position: "relative", textTransform: "none", letterSpacing: "normal",
  } });

  const canvas = h("canvas", { role: "img", "aria-label": "Distribution landscape showing training data style regions" });
  const canvasWrap = h("div", { style: {
    width: "100%", height: "200px", padding: "0 20px 8px", position: "relative",
  } });
  canvasWrap.appendChild(canvas);

  const regionButtons = h("div", { class: "viz-controls", style: { display: "none" } });
  regions.forEach((r) => {
    const btn = h("button", {
      class: "viz-toggle", "data-region": r.id,
      "aria-label": `Sample from ${r.label} region`,
    }, r.label);
    btn.addEventListener("click", () => {
      activeRegion = activeRegion === r.id ? null : r.id;
      updateState();
    });
    regionButtons.appendChild(btn);
  });

  const sampleBox = h("div", { style: {
    padding: "12px 20px", fontFamily: "'Lora', Georgia, serif", fontSize: "0.95rem",
    lineHeight: "1.6", color: "var(--ink)", minHeight: "3em", display: "none",
  } });

  const specLabel = h("label", { for: "viz-ap-spec", style: {
    fontSize: "0.8rem", color: "var(--ink2)", letterSpacing: "0.04em",
    fontFamily: "system-ui, -apple-system, 'Segoe UI', sans-serif",
  } }, vap.promptSpecLabel);
  const specValue = h("span", { "aria-hidden": "true", style: {
    fontSize: "0.8rem", color: "var(--ink2)", marginLeft: "auto",
    fontFamily: "system-ui, -apple-system, 'Segoe UI', sans-serif",
  } }, "0%");
  const specSlider = h("input", {
    type: "range", id: "viz-ap-spec", class: "viz-slider",
    min: "0", max: "100", step: "1", value: "0",
    "aria-label": "Prompt specificity: narrows the distribution from average to high-quality",
    "aria-valuemin": "0", "aria-valuemax": "100", "aria-valuenow": "0",
  });
  const specControls = h("div", { class: "viz-controls", style: { display: "none" } },
    specLabel, specValue, specSlider
  );

  const specSampleBox = h("div", { style: {
    padding: "12px 20px", fontFamily: "'Lora', Georgia, serif", fontSize: "0.95rem",
    lineHeight: "1.6", color: "var(--ink)", minHeight: "3em", display: "none",
  } });

  const srStatus = h("div", {
    class: "viz-sr-status", role: "status", "aria-live": "polite", "aria-atomic": "true",
  });

  element.append(canvasWrap, regionButtons, sampleBox, specControls, specSampleBox, srStatus);

  const gaussian = (x, mean, sigma) => Math.exp(-0.5 * ((x - mean) / sigma) ** 2);

  const drawLandscape = () => {
    const rect = canvasWrap.getBoundingClientRect();
    const w = rect.width - 40;
    const lH = 200;
    if (w <= 0) return;
    const ratio = scaleCanvas(canvas, w, lH);
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    ctx.clearRect(0, 0, w, lH);

    const styles = getComputedStyle(document.documentElement);
    const ink = styles.getPropertyValue("--ink").trim();
    const ink2 = styles.getPropertyValue("--ink2").trim();
    const ink3 = styles.getPropertyValue("--ink3").trim();
    const ink4 = styles.getPropertyValue("--ink4").trim();
    const acc = styles.getPropertyValue("--acc").trim();
    const seed = styles.getPropertyValue("--seed").trim();
    const regionColors = [ink2, ink3, acc, seed];

    const baseLine = lH - 30;
    const peakH = baseLine - 20;
    const sigma = currentState === 3 ? 0.04 + (1 - specificity / 100) * 0.08 : 0.08;

    // Draw combined distribution curve
    ctx.beginPath();
    ctx.moveTo(0, baseLine);
    for (let px = 0; px <= w; px++) {
      const x = px / w;
      let y = 0;
      regions.forEach((r) => {
        const weight = currentState === 3 ? (r.id === "poetic" ? 0.8 + specificity / 100 * 0.2 : 1 - specificity / 100 * 0.7) : 1;
        y += gaussian(x, r.peak, sigma) * weight;
      });
      const maxY = currentState === 3 ? 1 + specificity / 100 * 1.5 : regions.length;
      ctx.lineTo(px, baseLine - (y / maxY) * peakH);
    }
    ctx.lineTo(w, baseLine);
    ctx.closePath();
    ctx.fillStyle = ink4;
    ctx.globalAlpha = 0.3;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = ink2;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Draw region peaks
    regions.forEach((r, i) => {
      const px = r.peak * w;
      const peakVal = gaussian(r.peak, r.peak, sigma);
      const normalizedY = currentState === 3
        ? (r.id === "poetic" ? (0.8 + specificity / 100 * 0.2) : (1 - specificity / 100 * 0.7)) * peakVal
        : peakVal;
      const maxY = currentState === 3 ? 1 + specificity / 100 * 1.5 : regions.length;
      const tipY = baseLine - (normalizedY / maxY) * peakH;

      if (currentState >= 2) {
        ctx.fillStyle = regionColors[i];
        ctx.globalAlpha = activeRegion === r.id ? 0.9 : 0.5;
        ctx.beginPath();
        ctx.arc(px, tipY, activeRegion === r.id ? 6 : 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        ctx.fillStyle = activeRegion === r.id ? ink : ink3;
        ctx.font = `${activeRegion === r.id ? "bold " : ""}11px system-ui, -apple-system, 'Segoe UI', sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(r.label, px, tipY + 10);
      }
    });

    // Baseline axis
    ctx.strokeStyle = ink4;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, baseLine);
    ctx.lineTo(w, baseLine);
    ctx.stroke();

    ctx.fillStyle = ink3;
    ctx.font = "10px system-ui, -apple-system, 'Segoe UI', sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(vap.axisCommon, 4, baseLine + 14);
    ctx.textAlign = "right";
    ctx.fillText(vap.axisRare, w - 4, baseLine + 14);
  };

  const specSamples = vap.specSamples;

  const updateState = () => {
    if (currentState === 1) {
      regionButtons.style.display = "none";
      sampleBox.style.display = "none";
      specControls.style.display = "none";
      specSampleBox.style.display = "none";
      drawLandscape();
      srStatus.textContent = "Distribution landscape showing training data with peaks for common styles and valleys for rare styles.";
    } else if (currentState === 2) {
      regionButtons.style.display = "flex";
      specControls.style.display = "none";
      specSampleBox.style.display = "none";
      drawLandscape();
      regionButtons.querySelectorAll(".viz-toggle").forEach((btn) => {
        btn.classList.toggle("is-active", btn.getAttribute("data-region") === activeRegion);
      });
      if (activeRegion) {
        const r = regions.find((r) => r.id === activeRegion);
        sampleBox.textContent = r.sample;
        sampleBox.style.display = "block";
        srStatus.textContent = `Sampling from ${r.label} region: "${r.sample}"`;
      } else {
        sampleBox.style.display = "none";
        srStatus.textContent = "Select a style region to see a sample text.";
      }
    } else if (currentState === 3) {
      regionButtons.style.display = "none";
      sampleBox.style.display = "none";
      activeRegion = null;
      specControls.style.display = "flex";
      specSampleBox.style.display = "block";
      drawLandscape();
      const idx = Math.min(Math.floor(specificity / 100 * specSamples.length), specSamples.length - 1);
      specSampleBox.textContent = specSamples[idx];
      srStatus.textContent = `Prompt specificity ${specificity.toFixed(0)}%. ${specSamples[idx]}`;
    }
  };

  specSlider.addEventListener("input", () => {
    specificity = parseFloat(specSlider.value);
    specValue.textContent = `${specificity.toFixed(0)}%`;
    specSlider.setAttribute("aria-valuenow", specificity.toFixed(0));
    updateState();
  });

  const onStep = (idx) => {
    const totalSteps = 5;
    if (idx >= totalSteps - 1) {
      currentState = 0;
      regionButtons.style.display = "none";
      sampleBox.style.display = "none";
      specControls.style.display = "none";
      specSampleBox.style.display = "none";
      return;
    }
    if (idx <= 1) currentState = 1;
    else if (idx === 2) currentState = 2;
    else currentState = 3;
    updateState();
  };

  updateState();

  return {
    element,
    onStep,
    scrubUpdate: null,
    cleanup: () => {},
  };
};

const buildVizShaping = (state) => {
  const vs = LOCALE.viz.shaping;
  const prompt = vs.prompt;
  const baseResponse = vs.baseResponse;
  const tunedResponse = vs.tunedResponse;
  const raterPairs = vs.raterPairs;

  let showTuned = false;
  let raterIdx = 0;
  let choices = [];

    ctx.fillText(items[2].label, pad.left - 8, trainY + barH / 2);
    ctx.textAlign = "left";
    ctx.fillText(vdf.energy.trainingValue, pad.left + 8, trainY + barH / 2);

    // 10× label
    ctx.fillStyle = acc;
    ctx.font = "bold 12px system-ui, -apple-system, 'Segoe UI', sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(vdf.energy.multiplierLabel, pad.left + plotW / 2, pad.top + gap - 6);

    // Scale note
    ctx.fillStyle = ink3;
    ctx.font = "10px system-ui, -apple-system, 'Segoe UI', sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(vdf.energy.scaleNote, w / 2, trainY + barH + 16);
  };

  // State 2 canvas: Carbon emission accumulation bars
  const drawCarbonBars = (ctx, w, ch) => {
    const { ink2, ink3, ink4, acc, seed } = getColors();
    const base = ch - 30;
    const barW = 42;
    const gap = 32;
    const maxH = ch - 60;
    const carbonColors = [acc, ink2, seed];
    const items = vdf.carbon.canvasItems.map((item, i) => ({ ...item, color: carbonColors[i] }));
    const maxVal = 600;
    items.forEach((item, i) => {
      const x = 40 + i * (barW + gap);
      const barH = (item.value / maxVal) * maxH;
      ctx.fillStyle = ink4;
      ctx.fillRect(x, base - maxH, barW, maxH);
      ctx.fillStyle = item.color;
      ctx.fillRect(x, base - barH, barW, barH);
      ctx.fillStyle = ink2;
      ctx.font = "10px system-ui, -apple-system, 'Segoe UI', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(item.label, x + barW / 2, base + 14);
      ctx.fillText(`${item.value}t`, x + barW / 2, base - barH - 6);
    });

    ctx.fillStyle = ink3;
    ctx.font = "10px system-ui, -apple-system, 'Segoe UI', sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(vdf.carbon.axis, w / 2, 14);
  };

  // State 3 canvas: Resource usage horizontal bars
  const drawResourceMap = (ctx, w, ch) => {
    const { ink2, ink3, ink4, acc, seed } = getColors();
    const resourceColors = [acc, seed, ink2, ink3];
    const items = vdf.resources.canvasItems.map((item, i) => ({ ...item, color: resourceColors[i] }));
    const left = 90;
    const top = 22;
    const barW = w - left - 30;
    const barH = 14;
    const gap = 28;
    items.forEach((item, i) => {
      const y = top + i * gap;
      ctx.fillStyle = ink4;
      ctx.fillRect(left, y, barW, barH);
      ctx.fillStyle = item.color;
      ctx.fillRect(left, y, barW * item.value, barH);
      ctx.fillStyle = ink2;
      ctx.font = "11px system-ui, -apple-system, 'Segoe UI', sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      ctx.fillText(item.label, left - 8, y + barH / 2);
      ctx.textAlign = "left";
      ctx.fillText(Math.round(item.value * 100) + "%", left + barW + 6, y + barH / 2);
    });

    ctx.fillStyle = ink3;
    ctx.font = "10px system-ui, -apple-system, 'Segoe UI', sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(vdf.resources.axis, w / 2, ch - 10);
  };

  // State 4 canvas: Sustainability strategy contour lines
  const drawSustainability = (ctx, w, ch) => {
    const { ink3, ink4, acc } = getColors();
    const lines = 5;
    const gap = ch / (lines + 1);
    for (let i = 0; i < lines; i++) {
      const yBase = gap * (i + 1);
      ctx.strokeStyle = i === 2 ? acc : ink4;
      ctx.lineWidth = i === 2 ? 2 : 1;
      ctx.beginPath();
      for (let x = 0; x <= w; x += 12) {
        const wave = Math.sin((x / w) * Math.PI * 3 + i * 0.8) * 5;
        const y = yBase + wave + (i % 2 === 0 ? 2 : -2);
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    // Convergence arrows toward center
    const cx = w / 2;
    const cy = ch / 2;
    ctx.strokeStyle = acc;
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    const arrows = [
      { x: 30, y: 30 }, { x: w - 30, y: 30 },
      { x: 30, y: ch - 30 }, { x: w - 30, y: ch - 30 },
    ];
    arrows.forEach((a) => {
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(cx, cy);
      ctx.stroke();
    });
    ctx.setLineDash([]);

    ctx.fillStyle = acc;
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI * 2);
    ctx.fill();
  };

  const drawCanvas = () => {
    if (currentState === 1) return withCanvas(drawEnergyMeter);
    if (currentState === 2) return withCanvas(drawCarbonBars);
    if (currentState === 3) return withCanvas(drawResourceMap);
    return withCanvas(drawSustainability);
  };

  const setPanelVisibility = () => {
    panelEnergy.style.display = currentState === 1 ? "block" : "none";
    panelCarbon.style.display = currentState === 2 ? "block" : "none";
    panelResources.style.display = currentState === 3 ? "block" : "none";
    panelSustain.style.display = currentState === 4 ? "block" : "none";
  };

  const updateState = () => {
    setPanelVisibility();
    drawCanvas();
    if (currentState === 1) {
      srStatus.textContent = vdf.energy.sr;
    } else if (currentState === 2) {
      srStatus.textContent = vdf.carbon.sr;
    } else if (currentState === 3) {
      srStatus.textContent = vdf.resources.sr;
    } else if (currentState === 4) {
      srStatus.textContent = vdf.sustain.sr;
    }
  };

  const onStep = (idx) => {
    const totalSteps = 5;
    if (idx >= totalSteps - 1) {
      currentState = 0;
      setPanelVisibility();
      return;
    }
    currentState = Math.min(idx + 1, 4);
    updateState();
  };

  const resizeObserver = new ResizeObserver(() => {
    if (currentState > 0) drawCanvas();
  });
  resizeObserver.observe(canvasWrap);

  updateState();

  return {
    element,
    onStep,
    scrubUpdate: null,
    cleanup: () => {
      resizeObserver.disconnect();
    },
  };
};

    } },

    ));

  panelRisk.append(

      vnzc.risk.caption
    )
  );

  const panelTimeline = buildPanel();
  const timelineList = h("div", { style: {
    display: "grid",
    gap: "6px",
    fontFamily: "system-ui, -apple-system, 'Segoe UI', sans-serif",
    fontSize: "0.82rem",
    color: "var(--ink2)",
  } });
  vnzc.timeline.items.forEach((item) => timelineList.appendChild(h("div", null, item.full)));
  panelTimeline.append(

    h("div", { style: { marginTop: "8px", color: "var(--ink)" } },

    )
  );

  const panelStrategy = buildPanel();
  const strategyGrid = h("div", { style: {
    display: "grid",
    gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))",
    gap: "12px",
    fontFamily: "system-ui, -apple-system, 'Segoe UI', sans-serif",
    fontSize: "0.78rem",
    textTransform: "uppercase",
    letterSpacing: "0.05em",
  } });
  const buildStrategy = (title, items) => h("div", { style: {
    padding: "10px 12px",
    borderRadius: "12px",
    border: "1px solid var(--ink4)",
    background: "var(--paper)",
    color: "var(--ink2)",
  } },
    h("div", { style: { fontWeight: "600", color: "var(--ink)" } }, title),
    h("div", { style: { marginTop: "6px", display: "grid", gap: "4px" } },
      items.map((item) => h("div", null, item))
    )
  );
  vnzc.strategy.strategies.forEach((s) => strategyGrid.appendChild(buildStrategy(s.title, s.items)));
  panelStrategy.append(
    strategyGrid,
    h("div", { style: { marginTop: "8px", color: "var(--ink2)", textTransform: "none", letterSpacing: "normal" } },
      vnzc.strategy.caption
    )
  );

  const srStatus = h("div", {
    class: "viz-sr-status",
    role: "status",
    "aria-live": "polite",
    "aria-atomic": "true",
  });

  element.append(
    canvasWrap,
    panelCost,
    panelFlood,
    panelRisk,
    panelTimeline,
    panelStrategy,
    srStatus
  );

  const getColors = () => {
    const styles = getComputedStyle(document.documentElement);
    return {
      ink: styles.getPropertyValue("--ink").trim(),
      ink2: styles.getPropertyValue("--ink2").trim(),
      ink3: styles.getPropertyValue("--ink3").trim(),
      ink4: styles.getPropertyValue("--ink4").trim(),
      acc: styles.getPropertyValue("--acc").trim(),
      seed: styles.getPropertyValue("--seed").trim(),
    };
  };

  const withCanvas = (drawFn) => {
    const rect = canvasWrap.getBoundingClientRect();
    const w = rect.width - 40;
    const h = rect.height;
    if (w <= 0 || h <= 0) return;
    const ratio = scaleCanvas(canvas, w, h);
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    ctx.clearRect(0, 0, w, h);
    drawFn(ctx, w, h);
  };

  const drawCostCurve = (ctx, w, h) => {
    const { ink2, ink3, ink4, acc } = getColors();
    const pad = { left: 32, right: 16, top: 18, bottom: 28 };
    const plotW = w - pad.left - pad.right;
    const plotH = h - pad.top - pad.bottom;

    ctx.strokeStyle = ink4;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, pad.top);
    ctx.lineTo(pad.left, pad.top + plotH);
    ctx.lineTo(pad.left + plotW, pad.top + plotH);
    ctx.stroke();

    const legacy = [
      { x: 0, y: 0.95 },
      { x: 0.4, y: 0.7 },
      { x: 0.8, y: 0.4 },
      { x: 1, y: 0.25 },
    ];
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = ink3;
    ctx.beginPath();
    legacy.forEach((p, i) => {
      const px = pad.left + p.x * plotW;
      const py = pad.top + (1 - p.y) * plotH;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    });
    ctx.stroke();
    ctx.setLineDash([]);

    const ai = [
      { x: 0, y: 1 },
      { x: 0.35, y: 0.6 },
      { x: 0.7, y: 0.2 },
      { x: 1, y: 0.02 },
    ];
    ctx.strokeStyle = acc;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ai.forEach((p, i) => {
      const px = pad.left + p.x * plotW;
      const py = pad.top + (1 - p.y) * plotH;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    });
    ctx.stroke();

    ctx.fillStyle = ink2;
    ctx.font = "11px system-ui, -apple-system, 'Segoe UI', sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(vnzc.cost.physicalGoods, pad.left + 6, pad.top + plotH * 0.25);
    ctx.textAlign = "right";
    ctx.fillText(vnzc.cost.aiOutputs, pad.left + plotW, pad.top + plotH - 6);
  };

  const drawContentFlood = (ctx, w, h) => {
    const { ink2, ink4, acc, seed } = getColors();
    const base = h - 30;
    const barW = 42;
    const gap = 32;
    const maxH = h - 60;
    const floodColors = [acc, ink2, seed];
    const items = vnzc.flood.canvasLabels.map((label, i) => ({
      label, color: floodColors[i], value: [250, 45, 9][i],
    }));
    const maxVal = 260;
    items.forEach((item, i) => {
      const x = 28 + i * (barW + gap);
      const barH = (item.value / maxVal) * maxH;
      ctx.fillStyle = ink4;
      ctx.fillRect(x, base - maxH, barW, maxH);
      ctx.fillStyle = item.color;
      ctx.fillRect(x, base - barH, barW, barH);
      ctx.fillStyle = ink2;
      ctx.font = "10px system-ui, -apple-system, 'Segoe UI', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(item.label, x + barW / 2, base + 14);
    });
  };

  const drawRiskDashboard = (ctx, w, h) => {
    const { ink2, ink3, ink4, acc } = getColors();
    const risks = [0.9, 0.75, 0.68, 0.82];
    const left = 28;
    const top = 22;
    const barW = w - 60;
    const barH = 12;
    const gap = 26;
    risks.forEach((score, i) => {
      const y = top + i * gap;
      ctx.fillStyle = ink4;
      ctx.fillRect(left, y, barW, barH);
      ctx.fillStyle = acc;
      ctx.fillRect(left, y, barW * score, barH);
      ctx.fillStyle = ink3;
      ctx.fillRect(left + barW * 0.5, y - 2, 1, barH + 4);
      ctx.fillStyle = ink2;
      ctx.font = "10px system-ui, -apple-system, 'Segoe UI', sans-serif";
      ctx.textAlign = "right";
      ctx.fillText(Math.round(score * 100) + "%", left + barW + 12, y + 10);
    });
  };

  const drawTimeline = (ctx, w, h) => {
    const { ink2, ink3, ink4, acc } = getColors();
    const items = vnzc.timeline.items;
    const left = 22;
    const right = w - 22;
    const y = h / 2;
    ctx.strokeStyle = ink4;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(left, y);
    ctx.lineTo(right, y);
    ctx.stroke();
    items.forEach((item, i) => {
      const x = left + (i / (items.length - 1)) * (right - left);
      ctx.fillStyle = i === items.length - 1 ? acc : ink3;
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = ink4;
      ctx.beginPath();
      ctx.moveTo(x, y - 10);
      ctx.lineTo(x, y + 10);
      ctx.stroke();
      ctx.fillStyle = ink2;
      ctx.font = "10px system-ui, -apple-system, 'Segoe UI', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(item.year, x, y - 16);
      ctx.fillStyle = ink3;
      ctx.fillText(item.label, x, y + 22);
    });
  };

  const drawStrategyLandscape = (ctx, w, h) => {
    const { ink3, ink4, acc } = getColors();
    const lines = 5;
    const gap = h / (lines + 1);
    for (let i = 0; i < lines; i++) {
      const yBase = gap * (i + 1);
      ctx.strokeStyle = i === 2 ? acc : ink4;
      ctx.lineWidth = i === 2 ? 2 : 1;
      ctx.beginPath();
      for (let x = 0; x <= w; x += 12) {
        const wave = Math.sin((x / w) * Math.PI * 2 + i) * 6;
        const y = yBase + wave + (i % 2 === 0 ? 3 : -3);
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    ctx.strokeStyle = ink3;
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(6, 12, w - 12, h - 24);
    ctx.setLineDash([]);
  };

  const drawCanvas = () => {
    if (currentState === 1) return withCanvas(drawCostCurve);
    if (currentState === 2) return withCanvas(drawContentFlood);
    if (currentState === 3) return withCanvas(drawRiskDashboard);
    if (currentState === 4) return withCanvas(drawTimeline);
    return withCanvas(drawStrategyLandscape);
  };

  const setPanelVisibility = () => {
    panelCost.style.display = currentState === 1 ? "block" : "none";
    panelFlood.style.display = currentState === 2 ? "block" : "none";
    panelRisk.style.display = currentState === 3 ? "block" : "none";
    panelTimeline.style.display = currentState === 4 ? "block" : "none";
    panelStrategy.style.display = currentState === 5 ? "block" : "none";
  };

  const stopCounterAnimation = () => {
    if (counterRaf !== null) {
      cancelAnimationFrame(counterRaf);
      counterRaf = null;
    }
    counterStart = null;
  };

  const updateCounterText = (values) => {
    textCounter.value.textContent = `${Math.round(values.text)}M/day`;
    imageCounter.value.textContent = `${Math.round(values.images)}M/day`;
    codeCounter.value.textContent = `${Math.round(values.code)}M/day`;
  };

  const startCounterAnimation = () => {
    stopCounterAnimation();
    if (reduced()) {
      updateCounterText(counterTargets);
      return;
    }
    const duration = 1600;
    const animate = (timestamp) => {
      if (counterStart === null) counterStart = timestamp;
      const t = Math.min((timestamp - counterStart) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      updateCounterText({
        text: counterTargets.text * eased,
        images: counterTargets.images * eased,
        code: counterTargets.code * eased,
      });
      if (t < 1) {
        counterRaf = requestAnimationFrame(animate);
      } else {
        counterRaf = null;
      }
    };
    counterRaf = requestAnimationFrame(animate);
  };

  const updateState = () => {
    setPanelVisibility();
    drawCanvas();
    if (currentState === 2) {
      startCounterAnimation();
    } else {
      stopCounterAnimation();
    }
    if (currentState === 1) {
      srStatus.textContent = vnzc.cost.sr;
    } else if (currentState === 2) {
      srStatus.textContent = vnzc.flood.sr;
    } else if (currentState === 3) {
      srStatus.textContent = vnzc.risk.sr;
    } else if (currentState === 4) {
      srStatus.textContent = vnzc.timeline.sr;
    } else if (currentState === 5) {
      srStatus.textContent = vnzc.strategy.sr;
    }
  };

  const onStep = (idx) => {
    const totalSteps = 6;
    if (idx >= totalSteps - 1) {
      currentState = 0;
      setPanelVisibility();
      stopCounterAnimation();
      return;
    }
    currentState = Math.min(idx + 1, 5);
    updateState();
  };

  const resizeObserver = new ResizeObserver(() => {
    if (currentState > 0) drawCanvas();
  });
  resizeObserver.observe(canvasWrap);

  updateCounterText({ text: 0, images: 0, code: 0 });
  updateState();

  return {
    element,
    onStep,
    scrubUpdate: null,
    cleanup: () => {
      stopCounterAnimation();
      resizeObserver.disconnect();
    },
  };
};

  const vizBuilders = {
    "next-word": buildVizNextWord,
    "averaging-problem": buildVizAveragingProblem,
    "the-shaping": buildVizShaping,
    "near-zero-cost-impact": buildVizNearZeroCostImpact,
    "digital-footprints": buildVizDigitalFootprints,
    "automation-of-cognition": buildVizAutomationOfCognition,
    "algorithm-as-muse": buildVizAlgorithmAsMuse,
  };
  const vizBuilder = vizBuilders[plateauId];
  const viz = vizBuilder ? vizBuilder(state) : null;

  const scrolly = buildScrolly({
    steps,
    whispers: scrollyLocale.whispers,
    questionCards: LOCALE.questionCards[plateauId] || [],
    vizContent: viz ? viz.element : undefined,
    scrubUpdate: viz ? viz.scrubUpdate : undefined,
    onStepChange: viz ? viz.onStep : undefined,
    state,
    plateauId,
  });
  main.append(scrolly.section, engagementEl);

  const totalInlineSeeds = scrolly.section.querySelectorAll(".inline-seed-button").length;
  initEngagement(state, plateauId, totalInlineSeeds);
  engagementEl.textContent = LOCALE.ui.seedsExplored((state.eg[plateauId] || {}).opened || 0, totalInlineSeeds);
  cleanup = () => {
    scrolly.cleanup();
    if (viz && viz.cleanup) viz.cleanup();
  };

  return { view: main, cleanup };
};
const setView = ({ view, cleanup }) => {
  activeCleanup();
  const previous = Array.from(app.children);
  previous.forEach((el) => {
    el.classList.remove("is-visible");
    const remove = () => el.remove();
    el.addEventListener("transitionend", remove, { once: true });
    setTimeout(remove, 300);
  });
  window.scrollTo(0, 0);
  app.appendChild(view);
  requestAnimationFrame(() => {
    view.classList.add("is-visible");
  });
  activeCleanup = cleanup;
};

const buildNavigationChrome = (state, currentId) => {
  const miniMap = buildMiniMap(state, currentId);
  const overlay = buildOverlay(state);
  let lastActive = null;

  overlay.focusables.forEach((el) => {
    el.setAttribute("tabindex", "-1");
  });

  const openOverlay = () => {
    lastActive = document.activeElement;
    overlay.overlay.classList.add("is-open");
    overlay.overlay.setAttribute("aria-hidden", "false");
    document.body.classList.add("overlay-open");
    overlay.focusables.forEach((el) => {
      el.removeAttribute("tabindex");
    });
    overlay.closeButton.focus();
  };

  const closeOverlay = () => {
    overlay.overlay.classList.remove("is-open");
    overlay.overlay.setAttribute("aria-hidden", "true");
    document.body.classList.remove("overlay-open");
    overlay.focusables.forEach((el) => {
      el.setAttribute("tabindex", "-1");
    });
    if (lastActive && typeof lastActive.focus === "function") {
      lastActive.focus();
    }
  };

  const handleKeyDown = (event) => {
    if (event.key === "Escape") {
      event.preventDefault();
      closeOverlay();
    }
    trapFocus(overlay.overlay, event);
  };

  miniMap.button.addEventListener("click", openOverlay);
  overlay.backdrop.addEventListener("click", closeOverlay);
  overlay.closeButton.addEventListener("click", closeOverlay);
  overlay.overlay.addEventListener("keydown", handleKeyDown);

  const updateOverlay = (newState) => {
    overlay.updateState(newState);
  };

  return {
    miniMap,
    overlay,
    updateOverlay,
    closeOverlay,
    cleanup: () => {
      miniMap.cleanup();
      overlay.cleanup();
      miniMap.button.removeEventListener("click", openOverlay);
      overlay.backdrop.removeEventListener("click", closeOverlay);
      overlay.closeButton.removeEventListener("click", closeOverlay);
      overlay.overlay.removeEventListener("keydown", handleKeyDown);
      document.body.classList.remove("overlay-open");
      overlay.overlay.remove();
      miniMap.container.remove();
    },
  };
};

let liminalPending = null;

document.addEventListener("click", (e) => {
  const link = e.target.closest("a.whisper, a.simple-whisper, a.question-card, a.dangling-link");
  if (!link) return;
  const href = link.getAttribute("href");
  if (!href || !href.startsWith("#/")) return;
  if (link.classList.contains("whisper") || link.classList.contains("simple-whisper")) {
    liminalPending = link.textContent.trim();
  } else if (link.classList.contains("question-card")) {
    const span = link.querySelector("span");
    liminalPending = span ? span.textContent.trim() : link.textContent.trim();
  } else if (link.classList.contains("dangling-link")) {
    liminalPending = link.textContent.trim();
  }
});

const showLiminalTransition = (questionText, callback) => {
  if (prefersReducedMotion() || !questionText) {
    callback();
    return;
  }
  const overlay = h("div", { class: "liminal-transition" },
    h("p", { class: "liminal-question" }, questionText)
  );
  document.body.appendChild(overlay);
  requestAnimationFrame(() => {
    overlay.classList.add("is-visible");
    setTimeout(() => {
      overlay.classList.add("is-fading");
      overlay.classList.remove("is-visible");
      overlay.addEventListener("transitionend", () => {
        overlay.remove();
      }, { once: true });
      callback();
    }, 500);
  });
};

let bgTempCleanup = null;

const setupBgTemp = (isLanding) => {
  if (bgTempCleanup) bgTempCleanup();
  if (isLanding || prefersReducedMotion()) {
    document.documentElement.style.setProperty("--bg-temp", "0");
    bgTempCleanup = null;
    return;
  }
  let ticking = false;
  const onScroll = () => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      const scrollTop = window.scrollY;
      const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = scrollHeight > 0 ? Math.min(1, scrollTop / scrollHeight) : 0;
      document.documentElement.style.setProperty("--bg-temp", progress.toFixed(3));
      ticking = false;
    });
  };
  window.addEventListener("scroll", onScroll, { passive: true });
  onScroll();
  bgTempCleanup = () => {
    window.removeEventListener("scroll", onScroll);
    document.documentElement.style.setProperty("--bg-temp", "0");
  };
};

const GHOSTFADE_MAP = {
  "next-word": { requires: ["weight-of-words"] },
  "averaging-problem": { requires: ["weight-of-words"] },
  "the-shaping": { requires: ["quality"] },
  "weight-of-words": { requires: ["next-word"] },
  quality: { requires: ["the-shaping"] },
  "understanding-illusion": { requires: ["weight-of-words"] },
  "practical-guide": { requires: ["next-word", "averaging-problem"] },
  "tool-user": { requires: ["the-shaping", "practical-guide"] },
  "algorithm-as-muse": { requires: ["next-word", "averaging-problem"] },
  "echoes-of-the-past": { requires: ["quality", "averaging-problem"] },
  "learning-machines-learning-humans": { requires: ["understanding-illusion"] },
  "automation-of-cognition": { requires: ["tool-user"] },
  "black-box-oracle": { requires: ["understanding-illusion", "the-shaping"] },
  "digital-footprints": { requires: ["averaging-problem"] },
  "artificial-brain": { requires: ["understanding-illusion"] },
  "empathy-machine": { requires: ["understanding-illusion"] },
  "near-zero-cost-impact": { requires: ["averaging-problem", "quality"] },
};

const applyGhostfading = (container, plateauId, visited) => {
  const config = GHOSTFADE_MAP[plateauId];
  if (!config) return;
  const hasVisited = config.requires.some((req) => visited.has(req));
  if (!hasVisited) return;
  const keywords = LOCALE.ghostfadeKeywords[plateauId];
  if (!keywords) return;
  const paragraphs = container.querySelectorAll("p");
  paragraphs.forEach((p) => {
    const text = p.textContent.toLowerCase();
    if (keywords.some((kw) => text.includes(kw.toLowerCase()))) {
      p.classList.add("ghostfaded");
    }
  });
};

let persistentNavChrome = null;

const renderRoute = (liminalQuestion) => {
  const state = loadState();
  state.te = deriveTraversedEdges(state.tr);
  const hash = location.hash.replace(/^#\/?/, "");
  const currentId = hash && getPlateau(hash) ? hash : null;

  if (hash && !currentId) {
    location.hash = "#/";
    return;
  }

  const doRender = () => {
    if (currentId) {
      recordVisit(state, currentId);
    }

    if (persistentNavChrome) {
      persistentNavChrome.closeOverlay();
      persistentNavChrome.miniMap.updateContext(state, currentId);
      persistentNavChrome.updateOverlay(state);
    } else {
      persistentNavChrome = buildNavigationChrome(state, currentId);
      document.body.append(
        persistentNavChrome.miniMap.container,
        persistentNavChrome.overlay.overlay
      );
    }

    if (!hash) {
      setupBgTemp(true);
      const landing = buildLandingView(state);
      setView({
        view: landing.view,
        cleanup: () => {
          landing.cleanup();
        },
      });
      return;
    }
    if (currentId) {
      setupBgTemp(false);
      const plateau = buildPlateauView(state, hash);
      setView({
        view: plateau.view,
        cleanup: () => {
          plateau.cleanup();
          if (bgTempCleanup) bgTempCleanup();
        },
      });
      requestAnimationFrame(() => {
        applyGhostfading(plateau.view, currentId, new Set(state.v));

        const dwellData = LOCALE.dwellAnnotations[currentId];
        if (dwellData) {
          const steps = plateau.view.querySelectorAll(".scrolly-step");
          steps.forEach((step, i) => {
            const key = `step-${i}`;
            if (dwellData[key]) {
              step.classList.add("dwell-target");
              step.dataset.dwellId = key;
            }
          });
          const dwellCleanup = setupDwellReveal(plateau.view, dwellData);
          const prevCleanup = plateau.cleanup;
          plateau.cleanup = () => { prevCleanup(); dwellCleanup(); };
        }
      });
    }
  };

  if (liminalQuestion) {
    showLiminalTransition(liminalQuestion, doRender);
  } else {
    doRender();
  }
};

window.addEventListener("hashchange", () => {
  const hash = location.hash.replace(/^#\/?/, "");
  const targetId = hash && getPlateau(hash) ? hash : null;
  let question = null;
  if (targetId) {
    question = liminalPending || LOCALE.entryQuestions[targetId] || null;
  }
  liminalPending = null;
  renderRoute(question);
});

if (LANGS.length > 1) {
  const nav = h("nav", { class: "lang-switcher", "aria-label": LOCALE.ui.langSwitcherLabel });
  LANGS.forEach(({ lang, label, url }) => {
    if (url === "./") {
      nav.appendChild(h("span", { class: "lang-current", "aria-current": "true", lang }, label));
    } else {
      nav.appendChild(h("a", { class: "lang-option", href: url, hreflang: lang }, label));
    }
  });
  document.body.appendChild(nav);
}

renderRoute();
    </script>
